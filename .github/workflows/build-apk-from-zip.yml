name: Build APK From ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Unzip project
        run: |
          rm -rf extracted
          mkdir extracted
          ZIP_FILE="$(find . -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          echo "Using zip: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          find extracted -maxdepth 4 -type f | head -80

      - name: Build debug APK
        run: |
          ROOT="$(dirname "$(find extracted -name settings.gradle | head -n 1)")"
          echo "Project root: $ROOT"
          cd "$ROOT"
          gradle assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XCommentAI-debug-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
