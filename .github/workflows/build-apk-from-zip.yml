name: Build APK From ZIP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Unzip project
        run: |
          mkdir extracted
          ZIP_FILE="$(ls *.zip | head -n 1)"
          echo "Using zip: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d extracted
          echo "Project files:"
          find extracted -maxdepth 3 -type f | head -50

      - name: Build debug APK
        run: |
          ROOT="$(dirname "$(find extracted -name gradlew | head -n 1)")"
          echo "Project root: $ROOT"
          chmod +x "$ROOT/gradlew"
          cd "$ROOT"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XCommentAI-debug-apk
          path: extracted/**/app/build/outputs/apk/debug/*.apk
